name: Backend CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      DB_USER: test
      DB_PASSWORD: test
      DB_HOST: localhost
      DB_NAME: test_db
      MAIL_HOST: localhost
      MAIL_PORT: 25
      MAIL_USERNAME: test
      MAIL_PASSWORD: test
      MAIL_FROM: test@flima.dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: backend/mvnw package -DskipTests -f backend/pom.xml

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend version
        id: version
        run: |
          VERSION=$(backend/mvnw help:evaluate -Dexpression=project.version -q -DforceStdout -f backend/pom.xml)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/src/main/docker/Dockerfile.jvm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Kubernetes manifest
        run: |
          sed -i "s|image: ghcr.io/devflima/flima.dev-backend:.*|image: ghcr.io/devflima/flima.dev-backend:${{ env.VERSION }}|g" k8s/backend/deployment.yaml
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add k8s/backend/deployment.yaml
          git commit -m "chore: update backend image tag to ${{ env.VERSION }} [skip ci]" || echo "No changes to commit"
          git push
