name: Backend CI Pipeline

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - main
      - development
    paths:
      - 'backend/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      DB_USER: test
      DB_PASSWORD: test
      DB_HOST: localhost
      DB_NAME: test_db
      MAIL_HOST: localhost
      MAIL_PORT: 25
      MAIL_USERNAME: test
      MAIL_PASSWORD: test
      MAIL_FROM: test@flima.dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para o SonarCloud

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test
        run: ./mvnw clean verify

      - name: SonarCloud Scan
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=devflima \
            -Dsonar.organization=devflima \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${SONAR_TOKEN}
