name: Backend CI Pipeline

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - main
      - development
    paths:
      - 'backend/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      DB_USER: test
      DB_PASSWORD: test
      DB_HOST: localhost
      DB_NAME: test_db
      MAIL_HOST: localhost
      MAIL_PORT: 25
      MAIL_USERNAME: test
      MAIL_PASSWORD: test
      MAIL_FROM: test@flima.dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # Necessário para o SonarCloud

      - name: Set up JDK 21
        uses: actions/setup-java@8df1039502502c38075306913e1115b3c8597b95 # v4.5.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate JWT Keys for Testing
        run: |
          mkdir -p src/main/resources
          openssl genrsa -out privateKey.pem 2048
          openssl pkcs8 -topk8 -inform PEM -outform PEM -in privateKey.pem -out src/main/resources/privateKey.pk8 -nocrypt
          openssl rsa -in privateKey.pem -pubout -outform PEM -out src/main/resources/publicKey.pem
          rm privateKey.pem

      - name: Build and Test
        run: ./mvnw clean verify

      - name: SonarCloud Scan
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=devflima \
            -Dsonar.organization=devflima \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/jacoco-report/jacoco.xml
