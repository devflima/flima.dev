name: CI Pipeline

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'frontend/**'
  pull_request:
    branches:
      - main
      - development
    paths:
      - 'frontend/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39225d3d04c05c1172a4648c27c35f302c3351d6 # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: |
          npm install -D @vitest/coverage-v8
          npx vitest run --coverage

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@02efed3023910e4eaf908826303c75a7e183d213 # v3.1.0
        with:
          projectBaseDir: frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
