# Defaults para evitar erro de validação no CI
DB_USER=test
DB_PASSWORD=test
DB_HOST=localhost
DB_NAME=test_db

MAIL_HOST=localhost
MAIL_PORT=25
MAIL_USERNAME=test
MAIL_PASSWORD=test
MAIL_FROM=test@flima.dev

# Test profile configurations
quarkus.mailer.mock=true

# Database generation for tests
quarkus.hibernate-orm.database-generation=drop-and-create

# Security Test Config
mp.jwt.verify.issuer=https://flima.dev

# Kafka Resilience Config
mp.messaging.incoming.contact-in.failure-strategy=dead-letter-queue
mp.messaging.incoming.contact-in.dead-letter-queue.topic=contact-messages-dlq
