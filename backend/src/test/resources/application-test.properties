# Ativar Dev Services (Postgres automático no Docker)
quarkus.datasource.db-kind=postgresql
quarkus.flyway.migrate-at-start=true

# Mock de Mailer para Testes
quarkus.mailer.mock=true

# JWT Test Config (Uses generated RSA keys)
mp.jwt.verify.issuer=https://flima.dev

# Kafka Resilience Config
mp.messaging.incoming.contact-in.failure-strategy=dead-letter-queue
mp.messaging.incoming.contact-in.dead-letter-queue.topic=contact-messages-dlq

# Database generation for tests
quarkus.hibernate-orm.database-generation=drop-and-create
