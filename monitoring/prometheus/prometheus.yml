global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'quarkus-backend'
    metrics_path: '/q/metrics'
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'health-exporter'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['health-exporter:9999']
