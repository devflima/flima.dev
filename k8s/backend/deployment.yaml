apiVersion: apps/v1
kind: Deployment
metadata:
  name: flima-backend
  namespace: portfolio
  labels:
    app: flima-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flima-backend
  template:
    metadata:
      labels:
        app: flima-backend
      annotations:
        rollout-trigger: "2026-05-06"
    spec:
      automountServiceAccountToken: false
      containers:
      - name: flima-backend
        image: ghcr.io/devflima/flima.dev-backend:1.0.0-SNAPSHOT
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: backend-secrets
        env:
        - name: JAVA_OPTS
          value: "-Xmx640m -Xms256m -XX:+UseG1GC"
        - name: JWT_PRIVATE_KEY_LOCATION
          value: /deployments/config/jwt/privateKey.pk8
        - name: JWT_PUBLIC_KEY_LOCATION
          value: /deployments/config/jwt/publicKey.pem
        livenessProbe:
          httpGet:
            path: /q/health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /q/health/ready
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
        volumeMounts:
        - name: jwt-keys
          mountPath: /deployments/config/jwt
          readOnly: true
        resources:
          limits:
            memory: "1Gi"
            cpu: "800m"
            ephemeral-storage: "1Gi"
          requests:
            memory: "512Mi"
            cpu: "200m"
            ephemeral-storage: "512Mi"
      volumes:
      - name: jwt-keys
        secret:
          secretName: backend-jwt-keys
---
apiVersion: v1
kind: Service
metadata:
  name: flima-backend-service
  namespace: portfolio
spec:
  selector:
    app: flima-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
