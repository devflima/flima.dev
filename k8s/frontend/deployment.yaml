apiVersion: apps/v1
kind: Deployment
metadata:
  name: flima-frontend
  namespace: portfolio
  labels:
    app: flima-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flima-frontend
  template:
    metadata:
      labels:
        app: flima-frontend
    spec:
      automountServiceAccountToken: false
      containers:
      - name: flima-frontend
        image: ghcr.io/devflima/flima.dev:1.0.0
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "256Mi"
            cpu: "250m"
            ephemeral-storage: "1Gi"
          requests:
            memory: "128Mi"
            cpu: "100m"
            ephemeral-storage: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: flima-frontend-service
  namespace: portfolio
spec:
  selector:
    app: flima-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
