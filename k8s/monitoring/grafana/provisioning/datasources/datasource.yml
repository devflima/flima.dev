apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: Prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Infinity
    type: yesoreyeram-infinity-datasource
    uid: Infinity
    access: proxy
    isDefault: false
    editable: true
    jsonData:
      tlsSkipVerify: true
      allowedHosts:
        - "host.docker.internal"
        - "host.docker.internal:8080"
        - "host.docker.internal:5173"
