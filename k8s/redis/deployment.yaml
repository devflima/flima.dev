apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: portfolio
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      automountServiceAccountToken: false
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          limits:
            memory: "128Mi"
            cpu: "100m"
            ephemeral-storage: "256Mi"
          requests:
            memory: "64Mi"
            cpu: "50m"
            ephemeral-storage: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: portfolio
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
